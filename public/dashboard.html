<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>GhostTracker | Real-time Analytics</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-dark: #0f172a;
            --card-dark: #1e293b;
            --accent-blue: #38bdf8;
            --accent-green: #4ade80;
            --accent-red: #fb7185;
            --accent-yellow: #fbbf24;
            --text-main: #f1f5f9;
            --text-dim: #94a3b8;
        }

        body {
            font-family: 'Pretendard', -apple-system, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            border-bottom: 1px solid #334155;
            padding-bottom: 15px;
        }

        h2 { margin: 0; font-size: 1.8rem; letter-spacing: -0.5px; }
        
        .status-badge {
            padding: 6px 14px;
            background: #334155;
            border-radius: 50px;
            font-size: 0.85rem;
            color: var(--accent-green);
            border: 1px solid #475569;
            transition: all 0.3s ease;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: var(--card-dark);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid #334155;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        .card-title {
            font-size: 0.9rem;
            color: var(--text-dim);
            margin-bottom: 15px;
            font-weight: 600;
        }

        #log-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .log-item {
            background: var(--card-dark);
            border: 1px solid #334155;
            padding: 14px 20px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .time {
            font-family: 'JetBrains Mono', monospace;
            color: var(--accent-blue);
            font-size: 0.85rem;
            width: 100px;
        }

        .tag {
            font-size: 0.7rem;
            padding: 4px 8px;
            border-radius: 4px;
            font-weight: 800;
            margin: 0 20px;
            min-width: 100px;
            text-align: center;
            background: #000;
        }

        .tag.page_view { color: var(--accent-blue); border: 1px solid var(--accent-blue); }
        .tag.product_click { color: var(--accent-yellow); border: 1px solid var(--accent-yellow); }
        .tag.begin_checkout { color: var(--accent-red); border: 1px solid var(--accent-red); }
        .tag.session_exit { color: #fff; border: 1px solid #fff; background: #475569; }
        .tag.session { color: var(--accent-green); border: 1px solid var(--accent-green); }

        .details { flex-grow: 1; font-size: 0.95rem; }
        .details b { color: #fff; }

        .session-id {
            font-size: 0.75rem;
            color: var(--text-dim);
            background: #1e293b;
            padding: 2px 8px;
            border-radius: 4px;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h2>📊 GhostTracker <span style="color:var(--accent-blue)">Real-time</span></h2>
        <div class="status-badge" id="status">연결 확인 중...</div>
    </header>

    <div class="stats-grid">
        <div class="card">
            <div class="card-title">이벤트 발생 트렌드 (실시간)</div>
            <canvas id="eventChart" height="100"></canvas>
        </div>
        <div class="card">
            <div class="card-title">이벤트 비율</div>
            <canvas id="typeChart"></canvas>
        </div>
    </div>

    <div id="log-container"></div>
</div>

<script>
let fetchInterval = null;

// --- Chart.js 초기화 ---
const ctxLine = document.getElementById('eventChart').getContext('2d');
const eventChart = new Chart(ctxLine, {
    type: 'line',
    data: {
        labels: [],
        datasets: [{
            label: 'Total Events',
            data: [],
            borderColor: '#38bdf8',
            tension: 0.4,
            fill: true,
            backgroundColor: 'rgba(56, 189, 248, 0.1)'
        }]
    },
    options: {
        responsive: true,
        plugins: { legend: { display: false } },
        scales: { 
            y: { beginAtZero: true, grid: { color: '#334155' } },
            x: { grid: { display: false } }
        }
    }
});

const ctxPie = document.getElementById('typeChart').getContext('2d');
const typeChart = new Chart(ctxPie, {
    type: 'doughnut',
    data: {
        labels: ['View', 'Click', 'Checkout', 'Others'],
        datasets: [{
            data: [0, 0, 0, 0],
            backgroundColor: ['#38bdf8', '#fbbf24', '#fb7185', '#4ade80'],
            borderWidth: 0
        }]
    },
    options: {
        plugins: { legend: { position: 'bottom', labels: { color: '#f1f5f9' } } }
    }
});

// --- 데이터 처리 로직 ---
function formatDetail(e) {
    const data = e.data || e;
    const eventName = e.event || e.event_type;

    if (eventName === 'page_view') return `<b>${data.page || data.pathname}</b> 페이지 방문`;
    if (eventName === 'product_click') return `상품 클릭: <b>${data.productName || '상품'}</b>`;
    if (eventName === 'begin_checkout') return `💰 결제 시도: <b>${Number(data.totalAmount || 0).toLocaleString()}원</b>`;
    
    // 분석 결과가 포함된 세션 종료 메시지
    if (eventName === 'session_exit') {
        const analysis = e.analysis || { label: "세션 종료", color: "#94a3b8" };
        return `🚪 세션 종료 | <span style="color:${analysis.color}; font-weight:bold;">[의도 분석: ${analysis.label}]</span>`;
    }

    if (eventName.includes('session')) return `세션 이벤트 감지 (${data.os_type || 'Device'})`;
    if (eventName === 'filter_change') return `필터 변경: <b style="color:var(--accent-yellow)">${data.filterType || '카테고리'}</b>`;

    return data.keyword ? `검색어: <b>${data.keyword}</b>` : '사용자 행동 분석 중...';
}

async function fetchLogs() {
    try {
        const res = await fetch("/api/logs", { cache: "no-store" });
        const data = await res.json();
        
        const container = document.getElementById("log-container");
        document.getElementById("status").textContent = `Live: ${new Date().toLocaleTimeString()}`;
        
        const stats = { view: 0, click: 0, checkout: 0, others: 0 };
        let isSessionEnded = false;
        
        container.innerHTML = "";
        data.slice(-15).reverse().forEach(e => {
            const eventName = e.event || e.event_type;
            const timeStr = e.timestamp ? new Date(e.timestamp).toLocaleTimeString() : "--:--:--";
            const sId = e.sessionId || e.session_id || "unknown";

            // 세션 종료 여부 확인
            if(eventName === 'session_exit') isSessionEnded = true;

            // 통계 합산
            if(eventName === 'page_view') stats.view++;
            else if(eventName === 'product_click') stats.click++;
            else if(eventName === 'begin_checkout') stats.checkout++;
            else stats.others++;

            const div = document.createElement("div");
            div.className = "log-item";
            
            // 태그 클래스 결정
            let tagClass = 'session';
            if(eventName.includes('view')) tagClass = 'page_view';
            else if(eventName.includes('click')) tagClass = 'product_click';
            else if(eventName.includes('checkout')) tagClass = 'begin_checkout';
            else if(eventName === 'session_exit') tagClass = 'session_exit';

            div.innerHTML = `
                <div class="time">${timeStr}</div>
                <div class="tag ${tagClass}">${eventName.replace('_', ' ')}</div>
                <div class="details">${formatDetail(e)}</div>
                <div class="session-id">ID:${sId.substring(0,6)}</div>
            `;
            container.appendChild(div);
        });

        // 차트 업데이트
        const now = new Date().toLocaleTimeString();
        eventChart.data.labels.push(now);
        eventChart.data.datasets[0].data.push(data.length);
        if(eventChart.data.labels.length > 10) {
            eventChart.data.labels.shift();
            eventChart.data.datasets[0].data.shift();
        }
        eventChart.update();

        typeChart.data.datasets[0].data = [stats.view, stats.click, stats.checkout, stats.others];
        typeChart.update();

        // ⭐ 세션 종료 감지 시 폴링 중단
        if (isSessionEnded && fetchInterval) {
            clearInterval(fetchInterval);
            document.getElementById("status").textContent = "분석 완료 (연결 종료)";
            document.getElementById("status").style.color = "var(--accent-yellow)";
            document.getElementById("status").style.borderColor = "var(--accent-yellow)";
            console.log("Session Exit 감지: 폴링을 중단합니다.");
        }

    } catch (err) {
        document.getElementById("status").textContent = "연결 오류";
        document.getElementById("status").style.color = "var(--accent-red)";
    }
}

// 초기 실행 및 인터벌 설정
fetchLogs();
fetchInterval = setInterval(fetchLogs, 1500);
</script>
</body>
</html>
